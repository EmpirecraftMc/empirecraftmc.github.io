<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ore UI - Bedrock Style</title>

<style>
body {
    margin: 0;
    background: linear-gradient(#2b2d31, #1e1f23);
    font-family: "Segoe UI", sans-serif;
    color: #e0e0e0;
}

/* Container */
.ui {
    width: 900px;
    margin: 40px auto;
}

/* Title */
.title {
    font-size: 48px;
    font-weight: bold;
    letter-spacing: 4px;
    margin-bottom: 30px;
}

/* Buttons */
.btn {
    background: #3a3b3f;
    border: 2px solid #5a5b60;
    padding: 14px;
    margin-bottom: 12px;
    text-align: center;
    cursor: pointer;
    box-shadow: inset 0 -3px 0 #1a1a1a;
    transition: all 0.1s;
}

.btn:hover {
    border-color: #ffffff;
}

.btn:active {
    transform: translateY(2px);
    box-shadow: inset 0 3px 0 #000;
}

/* Primary (green) */
.btn.green {
    background: #4c8f2f;
    border-color: #6bbf3a;
}

/* Disabled */
.btn.disabled {
    background: #bcbec4;
    color: #555;
    border-color: #d0d0d0;
    pointer-events: none;
}

/* Dropdown */
.dropdown {
    background: #2f3034;
    border: 2px solid #555;
    padding: 12px;
    margin-bottom: 10px;
    position: relative;
}

.dropdown::after {
    content: "▾";
    position: absolute;
    right: 10px;
}

/* Slider */
.slider {
    margin: 20px 0;
}

.track {
    height: 6px;
    background: #aaa;
    position: relative;
}

.fill {
    height: 100%;
    width: 50%;
    background: #4caf50;
}

.thumb {
    width: 16px;
    height: 16px;
    background: #d0d0d0;
    border: 2px solid #777;
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
}

/* List Item */
.list-item {
    display: flex;
    align-items: center;
    background: #3a3b3f;
    border: 2px solid #555;
    padding: 10px;
    margin-bottom: 10px;
}

.icon {
    width: 40px;
    height: 40px;
    background: #aaa;
    margin-right: 10px;
}

.text {
    flex: 1;
}

.actions {
    display: flex;
    gap: 6px;
}

.small-btn {
    width: 30px;
    height: 30px;
    background: #bbb;
    border: 2px solid #666;
}

/* Tooltip */
.tooltip {
    display: inline-block;
    background: #3b6ee0;
    padding: 8px 12px;
    margin-top: 20px;
    position: relative;
}

.tooltip::after {
    content: "";
    position: absolute;
    bottom: -8px;
    left: 20px;
    border-width: 8px;
    border-style: solid;
    border-color: #3b6ee0 transparent transparent transparent;
}
</style>
</head>

<body>

<div class="ui">
    <div class="title">DESIGN SYSTEM</div>

    <!-- Buttons -->
    <div class="btn green">LABEL</div>
    <div class="btn">LABEL</div>
    <div class="btn disabled">LABEL</div>

    <!-- Dropdown -->
    <div class="dropdown">Label (X)</div>

    <!-- Slider -->
    <div class="slider">
        <div class="track">
            <div class="fill"></div>
            <div class="thumb"></div>
        </div>
    </div>

    <!-- List Item -->
    <div class="list-item">
        <div class="icon"></div>
        <div class="text">
            <div>Label</div>
            <div style="font-size: 12px; color: #aaa;">Description</div>
        </div>
        <div class="actions">
            <div class="small-btn"></div>
            <div class="small-btn"></div>
        </div>
    </div>

    <!-- Tooltip -->
    <div class="tooltip">Tooltip message</div>

</div>

</body>
</html>
